{% extends "base.html" %}
{% block title %}登录 - 冒险者公会{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-shield-halved fa-3x text-warning"></i>
                    <h3 class="mt-2">登录冒险者公会</h3>
                </div>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">用户名 / 邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="account" class="form-control" required placeholder="输入用户名或邮箱">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" required placeholder="输入密码">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-2">登录</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">还没有账号？ <a href="{{ url_for('register') }}">立即注册</a></small>
                </div>
                <div class="text-center mt-2">
                    <small class="text-muted">Demo账号: demo / demo123</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
