{% extends "base.html" %}
{% block title %}注册 - 冒险者公会{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-warning"></i>
                    <h3 class="mt-2">注册冒险者</h3>
                    <p class="text-muted">加入公会，开启你的冒险之旅</p>
                </div>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">用户名 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" required placeholder="用于登录的用户名">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">昵称 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-tag"></i></span>
                            <input type="text" name="nickname" class="form-control" required placeholder="公会上显示的名字">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" name="email" class="form-control" required placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">性别</label>
                        <select name="gender" class="form-select">
                            <option value="保密">保密</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" required minlength="6" placeholder="至少6位">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="confirm_password" class="form-control" required placeholder="再次输入密码">
                        </div>
                    </div>
                    <div class="alert alert-info small">
                        <i class="fas fa-gift"></i> 注册即送新手礼包：<strong>100虚拟货币</strong>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-2">注册</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">已有账号？ <a href="{{ url_for('login') }}">立即登录</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
